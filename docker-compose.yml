services:
  postgres:
    image: postgres:17-alpine
    container_name: simple-erp-postgres
    environment:
      POSTGRES_DB: simple_erp
      POSTGRES_USER: simple_erp
      POSTGRES_PASSWORD: simple_erp
    ports:      
      - "5432:5432"
    volumes:
      - simple-erp-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simple_erp -d simple_erp"]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    build:      
      context: .
      dockerfile: simple-erp.Api/Dockerfile
    container_name: simple-erp-api
    depends_on:
      postgres:        
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__SimpleErp: "Host=postgres;Port=5432;Database=simple_erp;Username=simple_erp;Password=simple_erp"
    ports:
      - "8080:8080"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: simple-erp-pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    environment:      
      PGADMIN_DEFAULT_EMAIL: admin@simpleerp.com
      PGADMIN_DEFAULT_PASSWORD: admin
      # Modo desktop: sem tela de login e sem master password (conveniência local).
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - simple-erp-pgadmin:/var/lib/pgadmin
      # Registra a conexão com o banco automaticamente ao subir.
      - ./infra/pgadmin/servers.json:/pgadmin4/servers.json:ro

volumes:
  simple-erp-pgdata:
  simple-erp-pgadmin:
