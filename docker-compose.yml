# Simple ERP — ambiente local completo (API + Postgres).
#
# Uso:
#   docker compose up -d --build      sobe tudo (build da API na primeira vez)
#   docker compose logs -f api        acompanha o log da API (migrations, requisições)
#   docker compose down               derruba os containers (mantém os dados)
#   docker compose down -v            derruba e APAGA o volume do banco
#
# Depois de subir: http://localhost:8080/swagger
services:
  postgres:
    image: postgres:17-alpine
    container_name: simple-erp-postgres
    environment:
      POSTGRES_DB: simple_erp
      POSTGRES_USER: simple_erp
      POSTGRES_PASSWORD: simple_erp
    ports:
      # Exposto no host para você inspecionar o banco (DBeaver/pgAdmin) e para o
      # 'dotnet ef' rodando fora do container.
      - "5432:5432"
    volumes:
      - simple-erp-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simple_erp -d simple_erp"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      # O contexto é a raiz da solução: a API precisa enxergar Core e Infraestrutura.
      context: .
      dockerfile: simple-erp.Api/Dockerfile
    container_name: simple-erp-api
    depends_on:
      postgres:
        # Só inicia depois que o healthcheck do Postgres passar. Ainda assim a API
        # tem retry ao aplicar as migrations, para cobrir a janela de corrida.
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Dentro da rede do compose, o banco é alcançado pelo NOME DO SERVIÇO
      # ('postgres'), não por localhost. Esta variável sobrescreve o valor do
      # appsettings.json (o '__' representa o ':' da configuração hierárquica).
      ConnectionStrings__SimpleErp: "Host=postgres;Port=5432;Database=simple_erp;Username=simple_erp;Password=simple_erp"
    ports:
      - "8080:8080"

volumes:
  simple-erp-pgdata:
